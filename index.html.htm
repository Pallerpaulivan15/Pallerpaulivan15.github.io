<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ate Elena's Street Eats</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff9f2;
      color: #333;
    }
    header {
      background-color: #ff914d;
      color: white;
      text-align: center;
      padding: 30px 0;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
    }
    header p {
      font-style: italic;
      font-size: 1.2em;
      margin: 10px 0 0;
    }
    section {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      color: #ff914d;
      border-bottom: 2px solid #ff914d;
      padding-bottom: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    ul li span {
      font-weight: bold;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-top: 10px;
      font-weight: bold;
    }
    input, select, textarea {
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }
    input[type="submit"] {
      background-color: #ff914d;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-size: 1em;
    }
    input[type="submit"]:hover {
      background-color: #ff7a1a;
    }
    footer {
      text-align: center;
      background-color: #ff914d;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ate Elena's Street Eats</h1>
    <p>"Good food, good mood – every bite from the heart of the streets!"</p>
  </header>
  <section>
    <h2>Our Menu</h2>
    <ul>
      <li><span>Kikiam</span> - 20/8pcs</li>
      <li><span>Pork Isaw</span> - 20/3pcs</li>
      <li><span>Fishballs</span> - 20/22pcs</li>
      <li><span>Kwek-Kwek</span> - 20/4pcs</li>
     
    </ul>
  </section>
  <section>
    <h2>Place Your Order</h2>
    <form action="#" method="post">
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>
      <label for="food">Select Food Item:</label>
      <select id="food" name="food" required>
        <option value="">Choose an item</option>
        
        <option value="Kikiam">Kikiam</option>
        <option value="isaw">Pork Isaw</option>
        <option value="fishballs">Fishballs</option>
        <option value="kwek-kwek">Kwek-Kwek</option>
    
      </select>
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" name="quantity" min="1" placeholder="Enter quantity" required>
      <label for="message">Special Instructions:</label>
      <textarea id="message" name="message" rows="4" placeholder="Any extra requests?"></textarea>
      <input type="submit" value="Submit Order">
    </form>
  </section>
  <footer>
    <p>© 2024 Ate Elena's Street Eats. All rights reserved.</p>
  </footer>
</body>
</html>
